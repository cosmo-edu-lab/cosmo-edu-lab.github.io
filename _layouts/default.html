<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title and page.url != '/' %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo %}
</head>
<body>

  {% include nav.html %}

  <main class="content">
    {% if page.url != '/' %}
      <header class="page-header">
        <h1>{{ page.title }}</h1>
      </header>
    {% endif %}

    {% if page.image %}
      <figure class="page-image">
        <img src="{{ page.image | relative_url }}" alt="{{ page.image_alt | default: page.title | default: site.title }}">
        {% if page.image_caption %}<figcaption>{{ page.image_caption }}</figcaption>{% endif %}
      </figure>
    {% endif %}

    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
